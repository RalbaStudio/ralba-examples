<div>
<H1>{{title}}</H1>
<p-button [routerLink]="['/create-item']" routerLinkActive="router-link-active" >add item</p-button>
</div>
<p-table [value]="(items$ | async )|| []" responsiveLayout="scroll">
    <ng-template pTemplate="header">
        <tr>
            <th pSortableColumn="date">Date <p-sortIcon field="date"></p-sortIcon></th>
            <th pSortableColumn="name">Name <p-sortIcon field="name"></p-sortIcon></th>
            <th pSortableColumn="from">From <p-sortIcon field="from"></p-sortIcon></th>
            <th pSortableColumn="to">To <p-sortIcon field="to"></p-sortIcon></th>
            <th pSortableColumn="amount">amount <p-sortIcon field="amount"></p-sortIcon></th>
            <th pSortableColumn="note">Note <p-sortIcon field="note"></p-sortIcon></th>
            <th>action</th>
        </tr>
    </ng-template>
    <ng-template pTemplate="body" let-item>
        <tr>
            <th>{{item.date}}</th>
            <th>{{item.name}}</th>
            <th>{{item.from}}</th>
            <th>{{item.to}}</th>
            <th>{{item.amount| currency: 'CZK'}}</th>
            <th>{{item.note}}</th>
            <th style="text-align: center">
                <button pButton [routerLink]="['/create-item']" (click)="update(item)"
                [queryParams]="{ id: item.id }" type="button" class="p-button-secondary" icon="pi pi-pencil"></button>
                <button pButton (click)="delete(item);$event.stopImmediatePropagation()" type="button" class="p-button-secondary" icon="pi pi-trash"></button>
            </th>
        </tr>
    </ng-template>
</p-table>

<pre>{{items$ | async | json}}</pre>
<div *ngFor="let item of items$| async"> 
<h4>Name {{item.name}}</h4>
<h3>ID {{item.id}}</h3>

</div>
