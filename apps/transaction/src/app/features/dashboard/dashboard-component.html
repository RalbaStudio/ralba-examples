<h1>{{titleDashboard}}</h1>
<div class="inline-flex" *ngFor="let item of items">
<p-card class="" header="{{item.name}}">

<p>{{item.note}}</p>
<p>Amount:{{item.amount| currency : "czk" }}</p>
<p-button (click)="createItem()">add item</p-button>
<p-button type="button" (click)="onSelect(item)">Select</p-button>
<a routerLink="/items/{{item.name}}">Detail</a>
</p-card>


</div>
<div *ngIf="selectedItem">
  <h2>{{selectedItem.name | uppercase}} Details</h2>
  <div>note: {{selectedItem.note}}</div>
  <div>
    <label for="item-name">Item name: </label>
    <input id="item-name" [(ngModel)]="selectedItem.name" placeholder="name">
  </div>
</div>
